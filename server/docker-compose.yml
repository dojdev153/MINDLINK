version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: mindlink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P0stin'guy
      POSTGRES_DB: mindlink_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
